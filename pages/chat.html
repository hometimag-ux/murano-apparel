<div style="padding: 20px;">
    <h1>💬 Чат с клиентами</h1>
    <div style="display: flex; gap: 20px; margin-top: 20px; height: 70vh;">
        <!-- Список клиентов -->
        <div style="width: 280px; background: #f8f9fa; border-radius: 16px; overflow: hidden;">
            <div style="padding: 12px; background: white; border-bottom: 1px solid #ddd;">
                <input type="text" id="chatSearch" placeholder="🔍 Поиск..." style="width:100%; padding: 8px; border:1px solid #ddd; border-radius: 20px;">
            </div>
            <div id="chatClientsList" style="overflow-y: auto; height: calc(100% - 50px);">
                <div style="padding: 20px; text-align: center; color: #999;">Загрузка...</div>
            </div>
        </div>
        
        <!-- Область переписки -->
        <div style="flex: 1; background: white; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden;">
            <div id="chatHeader" style="padding: 16px; border-bottom: 1px solid #ddd; background: white;">
                <div style="font-weight: 600;">Выберите клиента</div>
            </div>
            <div id="chatMessages" style="flex: 1; overflow-y: auto; padding: 16px; background: #fafafa;">
                <div style="text-align: center; color: #999; margin-top: 40px;">💬 Нажмите на клиента, чтобы начать диалог</div>
            </div>
            <div id="chatInputArea" style="padding: 16px; border-top: 1px solid #ddd; background: white; display: none;">
                <div style="display: flex; gap: 12px;">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." style="flex:1; padding: 12px; border:1px solid #ddd; border-radius: 30px;">
                    <button id="sendMessageBtn" style="background: #0066cc; color: white; border: none; padding: 0 24px; border-radius: 30px;">📤 Отправить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        let currentClient = null;
        let allMessages = {};
        let clients = [];

        function loadData() {
            const saved = localStorage.getItem('crm_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    const leads = data.leads || [];
                    const messages = data.messages || {};
                    allMessages = messages;
                    
                    // Собираем уникальных клиентов из заявок
                    const clientsMap = new Map();
                    leads.forEach(lead => {
                        if (!clientsMap.has(lead.phone)) {
                            clientsMap.set(lead.phone, {
                                phone: lead.phone,
                                name: lead.client_name,
                                lastMessage: null
                            });
                        }
                    });
                    clients = Array.from(clientsMap.values());
                } catch(e) {}
            }
            renderClientsList();
        }

        function renderClientsList() {
            const container = document.getElementById('chatClientsList');
            if (!container) return;
            
            if (clients.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">Нет клиентов</div>';
                return;
            }
            
            container.innerHTML = clients.map(client => `
                <div class="chat-client-item" data-phone="${client.phone}" style="padding: 12px 16px; border-bottom: 1px solid #eee; cursor: pointer; background: ${currentClient?.phone === client.phone ? '#e3f2fd' : 'white'}">
                    <div style="font-weight: 600;">${client.name}</div>
                    <div style="font-size: 12px; color: #666;">${client.phone}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.chat-client-item').forEach(el => {
                el.addEventListener('click', () => {
                    const phone = el.dataset.phone;
                    const client = clients.find(c => c.phone === phone);
                    if (client) openChat(client);
                });
            });
        }

        function openChat(client) {
            currentClient = client;
            renderClientsList();
            
            document.getElementById('chatHeader').innerHTML = `<div style="font-weight: 600;">${client.name}</div><div style="font-size: 12px; color: #666;">${client.phone}</div>`;
            document.getElementById('chatInputArea').style.display = 'block';
            
            const messages = allMessages[client.phone] || [];
            const container = document.getElementById('chatMessages');
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; margin-top: 40px;">Нет сообщений. Напишите что-нибудь</div>';
            } else {
                container.innerHTML = messages.map(msg => `
                    <div style="display: flex; justify-content: ${msg.from_manager ? 'flex-end' : 'flex-start'}; margin-bottom: 12px;">
                        <div style="background: ${msg.from_manager ? '#0066cc' : '#e9ecef'}; color: ${msg.from_manager ? 'white' : '#333'}; padding: 10px 14px; border-radius: 18px; max-width: 70%;">
                            ${msg.text}
                            <div style="font-size: 10px; opacity: 0.7; margin-top: 4px;">${new Date(msg.created_at).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `).join('');
            }
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            if (!currentClient) return;
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            if (!allMessages[currentClient.phone]) allMessages[currentClient.phone] = [];
            allMessages[currentClient.phone].push({
                id: Date.now(),
                text: text,
                from_manager: true,
                created_at: new Date().toISOString()
            });
            
            // Сохраняем в localStorage
            const saved = localStorage.getItem('crm_data');
            if (saved) {
                const data = JSON.parse(saved);
                data.messages = allMessages;
                localStorage.setItem('crm_data', JSON.stringify(data));
            }
            
            input.value = '';
            openChat(currentClient);
        }

        document.getElementById('sendMessageBtn')?.addEventListener('click', sendMessage);
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        loadData();
    })();
</script>
