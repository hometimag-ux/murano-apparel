<div class="products-container" style="padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="font-size: 24px;">📦 Товары</h1>
        <button id="addProductBtnGlobal" style="background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">+ Добавить товар</button>
    </div>

    <!-- Фильтры -->
    <div style="display: flex; gap: 12px; margin-bottom: 20px;">
        <input type="text" id="searchProducts" placeholder="🔍 Поиск..." style="flex:1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;">
        <select id="categoryFilterProducts" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;">
            <option value="all">Все категории</option>
        </select>
    </div>

    <!-- Сетка товаров -->
    <div id="productsGridContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px;">
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
    </div>
</div>

<!-- Модальное окно -->
<div id="productModalGlobal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow: auto; padding: 20px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
            <h3 id="modalTitleGlobal">Добавить товар</h3>
            <button id="closeModalBtn" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <form id="productFormGlobal">
            <div style="margin-bottom: 12px;">
                <label>Название</label>
                <input type="text" id="productTitleGlobal" required style="width:100%; padding: 8px; border:1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Категория</label>
                <select id="productCategoryGlobal" style="width:100%; padding: 8px; border:1px solid #ddd; border-radius: 8px;"></select>
            </div>
            <div style="margin-bottom: 12px;">
                <label>Цена (₽)</label>
                <input type="number" id="productPriceGlobal" style="width:100%; padding: 8px; border:1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Цена со скидкой (₽)</label>
                <input type="number" id="productDiscountPriceGlobal" style="width:100%; padding: 8px; border:1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 12px;">
                <label>Размеры (через запятую)</label>
                <input type="text" id="productSizesGlobal" placeholder="S, M, L, XL" style="width:100%; padding: 8px; border:1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button type="button" id="cancelModalBtn" style="flex:1; padding: 10px; background: #ddd; border: none; border-radius: 8px;">Отмена</button>
                <button type="submit" style="flex:1; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 8px;">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        let products = [];
        let categories = [];
        let editingId = null;

        function loadData() {
            const saved = localStorage.getItem('crm_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    products = data.products || [];
                    categories = data.categories || [];
                } catch(e) {}
            }
            if (products.length === 0) {
                products = [
                    { id: 1, title: 'Футболка', price: 1990, discount_price: null, sizes: ['S','M','L'], category_id: 1 },
                    { id: 2, title: 'Джинсы', price: 3990, discount_price: 2990, sizes: ['30','32','34'], category_id: 1 }
                ];
            }
            if (categories.length === 0) {
                categories = [{ id: 1, title: 'Одежда' }];
            }
            render();
        }

        function saveToCRM() {
            const data = localStorage.getItem('crm_data');
            if (data) {
                const crm = JSON.parse(data);
                crm.products = products;
                crm.categories = categories;
                localStorage.setItem('crm_data', JSON.stringify(crm));
            } else {
                localStorage.setItem('crm_data', JSON.stringify({ products, categories, leads: [], settings: {} }));
            }
        }

        function render() {
            const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
            const catFilter = document.getElementById('categoryFilterProducts')?.value || 'all';
            const container = document.getElementById('productsGridContainer');
            if (!container) return;

            let filtered = products.filter(p => p.title.toLowerCase().includes(search));
            if (catFilter !== 'all') filtered = filtered.filter(p => p.category_id == catFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">Нет товаров</div>';
                return;
            }

            container.innerHTML = filtered.map(p => {
                const cat = categories.find(c => c.id == p.category_id);
                const hasDiscount = p.discount_price && p.discount_price < p.price;
                return `
                    <div style="border:1px solid #eee; border-radius: 16px; padding: 12px; background: white;">
                        <div style="font-size: 40px; text-align: center;">👕</div>
                        <h3>${p.title}</h3>
                        <div style="color:#666; font-size:12px;">${cat ? cat.title : '—'}</div>
                        <div style="margin: 8px 0;">
                            ${hasDiscount ? `<span style="text-decoration:line-through; color:#999;">${p.price} ₽</span> <span style="color:#f44336;">${p.discount_price} ₽</span>` : `<span>${p.price} ₽</span>`}
                        </div>
                        <div style="font-size:12px; color:#666;">Размеры: ${p.sizes?.join(', ') || '—'}</div>
                        <div style="display: flex; gap: 8px; margin-top: 12px;">
                            <button class="edit-product" data-id="${p.id}" style="flex:1; padding:6px; background:#f0f0f0; border:none; border-radius:8px;">✏️</button>
                            <button class="delete-product" data-id="${p.id}" style="flex:1; padding:6px; background:#ffebee; border:none; border-radius:8px;">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.edit-product').forEach(btn => {
                btn.addEventListener('click', () => editProduct(btn.dataset.id));
            });
            document.querySelectorAll('.delete-product').forEach(btn => {
                btn.addEventListener('click', () => deleteProduct(btn.dataset.id));
            });
        }

        function openModal(edit = false) {
            const modal = document.getElementById('productModalGlobal');
            if (modal) modal.style.display = 'flex';
            if (!edit) {
                editingId = null;
                document.getElementById('modalTitleGlobal').innerText = 'Добавить товар';
                document.getElementById('productFormGlobal').reset();
            }
        }

        function closeModal() {
            const modal = document.getElementById('productModalGlobal');
            if (modal) modal.style.display = 'none';
            editingId = null;
        }

        function editProduct(id) {
            const product = products.find(p => p.id == id);
            if (!product) return;
            editingId = id;
            document.getElementById('modalTitleGlobal').innerText = 'Редактировать товар';
            document.getElementById('productTitleGlobal').value = product.title || '';
            document.getElementById('productCategoryGlobal').value = product.category_id || '';
            document.getElementById('productPriceGlobal').value = product.price || '';
            document.getElementById('productDiscountPriceGlobal').value = product.discount_price || '';
            document.getElementById('productSizesGlobal').value = product.sizes?.join(', ') || '';
            openModal(true);
        }

        function deleteProduct(id) {
            if (confirm('Удалить товар?')) {
                products = products.filter(p => p.id != id);
                saveToCRM();
                render();
            }
        }

        function saveProduct(e) {
            e.preventDefault();
            const title = document.getElementById('productTitleGlobal').value;
            const category_id = parseInt(document.getElementById('productCategoryGlobal').value) || null;
            const price = parseInt(document.getElementById('productPriceGlobal').value) || 0;
            const discount_price = parseInt(document.getElementById('productDiscountPriceGlobal').value) || null;
            const sizes = document.getElementById('productSizesGlobal').value.split(',').map(s => s.trim()).filter(s => s);

            if (!title) return;

            if (editingId) {
                const index = products.findIndex(p => p.id == editingId);
                if (index !== -1) {
                    products[index] = { ...products[index], title, category_id, price, discount_price, sizes };
                }
            } else {
                const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
                products.push({ id: newId, title, category_id, price, discount_price, sizes });
            }
            saveToCRM();
            closeModal();
            render();
        }

        function renderCategoryFilter() {
            const select = document.getElementById('categoryFilterProducts');
            const catSelect = document.getElementById('productCategoryGlobal');
            if (select) {
                select.innerHTML = '<option value="all">Все категории</option>' + categories.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
                select.onchange = () => render();
            }
            if (catSelect) {
                catSelect.innerHTML = '<option value="">Выберите категорию</option>' + categories.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
            }
        }

        function init() {
            loadData();
            renderCategoryFilter();
            render();
            document.getElementById('addProductBtnGlobal')?.addEventListener('click', () => openModal(false));
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('cancelModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('productFormGlobal')?.addEventListener('submit', saveProduct);
            document.getElementById('searchProducts')?.addEventListener('input', () => render());
        }

        init();
    })();
</script>
