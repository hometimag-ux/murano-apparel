<div class="products-container" style="padding: 20px; font-family: system-ui, sans-serif;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 style="font-size: 24px;">📦 Товары</h1>
        <button id="addProductBtn" style="background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">+ Добавить товар</button>
    </div>

    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
        <input type="text" id="searchProducts" placeholder="🔍 Поиск..." style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 30px;">
        <select id="categoryFilter" style="padding: 10px; border: 1px solid #ddd; border-radius: 30px;">
            <option value="all">Все категории</option>
        </select>
    </div>

    <div id="productsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <div style="text-align: center; padding: 40px; grid-column: 1/-1;">Загрузка...</div>
    </div>
</div>

<!-- Модальное окно -->
<div id="productModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10000;">
    <div style="background: white; border-radius: 24px; width: 90%; max-width: 500px; padding: 20px;">
        <h3 id="modalTitle">Добавить товар</h3>
        <form id="productForm">
            <input type="text" id="productTitle" placeholder="Название" required style="width:100%; margin: 10px 0; padding: 10px;">
            <select id="productCategory" style="width:100%; margin: 10px 0; padding: 10px;"></select>
            <input type="number" id="productPrice" placeholder="Цена" style="width:100%; margin: 10px 0; padding: 10px;">
            <input type="number" id="productDiscount" placeholder="Цена со скидкой" style="width:100%; margin: 10px 0; padding: 10px;">
            <input type="text" id="productSizes" placeholder="Размеры (через запятую)" style="width:100%; margin: 10px 0; padding: 10px;">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" id="cancelModal" style="flex:1; padding: 10px;">Отмена</button>
                <button type="submit" style="flex:1; padding: 10px; background: #0066cc; color: white; border: none;">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        let products = [], categories = [], editingId = null;
        const modal = document.getElementById('productModal');
        
        function loadData() {
            const saved = localStorage.getItem('crm_data');
            if (saved) {
                const data = JSON.parse(saved);
                products = data.products || [];
                categories = data.categories || [];
            }
            if (!products.length) products = [{ id: 1, title: 'Футболка', price: 1990, sizes: ['S','M'] }];
            if (!categories.length) categories = [{ id: 1, title: 'Одежда' }];
            renderFilters();
            renderProducts();
        }
        
        function save() {
            const data = { products, categories, leads: [], messages: {}, settings: {} };
            localStorage.setItem('crm_data', JSON.stringify(data));
        }
        
        function renderProducts() {
            const search = document.getElementById('searchProducts').value.toLowerCase();
            const catFilter = document.getElementById('categoryFilter').value;
            let filtered = products.filter(p => p.title.toLowerCase().includes(search));
            if (catFilter !== 'all') filtered = filtered.filter(p => p.category_id == catFilter);
            
            const container = document.getElementById('productsGrid');
            if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:40px; grid-column:1/-1;">Нет товаров</div>'; return; }
            
            container.innerHTML = filtered.map(p => `
                <div style="border:1px solid #eee; border-radius: 16px; padding: 12px;">
                    <h3>${p.title}</h3>
                    <div>${p.price} ₽</div>
                    <div>Размеры: ${p.sizes?.join(', ') || '—'}</div>
                    <button class="edit-btn" data-id="${p.id}">✏️</button>
                    <button class="delete-btn" data-id="${p.id}">🗑️</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = () => editProduct(+btn.dataset.id));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = () => deleteProduct(+btn.dataset.id));
        }
        
        function renderFilters() {
            const filter = document.getElementById('categoryFilter');
            filter.innerHTML = '<option value="all">Все категории</option>' + categories.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
            const catSelect = document.getElementById('productCategory');
            catSelect.innerHTML = '<option value="">Без категории</option>' + categories.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
        }
        
        function openModal() { modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; editingId = null; document.getElementById('productForm').reset(); }
        
        function editProduct(id) {
            const p = products.find(p => p.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('productTitle').value = p.title;
            document.getElementById('productCategory').value = p.category_id || '';
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productDiscount').value = p.discount_price || '';
            document.getElementById('productSizes').value = p.sizes?.join(', ') || '';
            openModal();
        }
        
        function deleteProduct(id) {
            if (confirm('Удалить?')) {
                products = products.filter(p => p.id !== id);
                save();
                renderProducts();
            }
        }
        
        document.getElementById('addProductBtn').onclick = () => { editingId = null; document.getElementById('productForm').reset(); openModal(); };
        document.getElementById('cancelModal').onclick = closeModal;
        document.getElementById('productForm').onsubmit = (e) => {
            e.preventDefault();
            const product = {
                title: document.getElementById('productTitle').value,
                category_id: parseInt(document.getElementById('productCategory').value) || null,
                price: parseInt(document.getElementById('productPrice').value),
                discount_price: parseInt(document.getElementById('productDiscount').value) || null,
                sizes: document.getElementById('productSizes').value.split(',').map(s => s.trim()).filter(s => s)
            };
            if (editingId) {
                const index = products.findIndex(p => p.id === editingId);
                if (index !== -1) products[index] = { ...products[index], ...product };
            } else {
                product.id = Date.now();
                products.push(product);
            }
            save();
            closeModal();
            renderProducts();
        };
        
        document.getElementById('searchProducts').oninput = () => renderProducts();
        document.getElementById('categoryFilter').onchange = () => renderProducts();
        
        loadData();
    })();
</script>
