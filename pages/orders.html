<div style="padding: 24px;">
    <h1>📋 Заказы</h1>
    <div style="margin-top: 20px; background: #f8f9fa; border-radius: 16px; padding: 20px;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid #ddd;">
                    <th style="text-align: left; padding: 12px;">ID</th>
                    <th style="text-align: left; padding: 12px;">Клиент</th>
                    <th style="text-align: left; padding: 12px;">Сумма</th>
                    <th style="text-align: left; padding: 12px;">Статус</th>
                    <th style="text-align: left; padding: 12px;">Дата</th>
                </tr>
            </thead>
            <tbody id="ordersTable">
                <tr><td colspan="5" style="padding: 40px; text-align: center;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
    
    <script>
        function loadOrders() {
            const data = localStorage.getItem('crm_data');
            if (data) {
                const crm = JSON.parse(data);
                const leads = crm.leads || [];
                const tbody = document.getElementById('ordersTable');
                if (leads.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding: 40px; text-align: center;">Нет заказов</td></tr>';
                } else {
                    tbody.innerHTML = leads.map(lead => `
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 12px;">${lead.id}</td>
                            <td style="padding: 12px;">${lead.client_name}</td>
                            <td style="padding: 12px;">${(lead.total || 0).toLocaleString()} ₽</td>
                            <td style="padding: 12px;"><span style="background: #e3f2fd; padding: 4px 12px; border-radius: 20px;">${lead.status}</span></td>
                            <td style="padding: 12px;">${new Date(lead.created_at).toLocaleDateString()}</td>
                        </tr>
                    `).join('');
                }
            }
        }
        loadOrders();
    </script>
</div>
