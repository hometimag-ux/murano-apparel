<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление/Редактирование товара</title>
    <link rel="stylesheet" href="/murano-apparel/css/products.css">
    <style>
        .add-product-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #0066cc;
            text-decoration: none;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .form-title {
            font-size: 24px;
            margin-bottom: 24px;
            color: #1a1a2e;
        }
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .form-section h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #0066cc;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .btn-save {
            background: #0066cc;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        .btn-delete {
            background: #f44336;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        /* Таблица размеров */
        .sizes-table-container {
            overflow-x: auto;
            margin-top: 16px;
        }
        .sizes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .sizes-table th,
        .sizes-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        .sizes-table th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .sizes-table input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .add-row-btn {
            margin-top: 12px;
        }
        /* Теги */
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            min-height: 50px;
        }
        .tag {
            background: #e3f2fd;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .tag-remove {
            cursor: pointer;
            color: #999;
        }
        .tag-input {
            border: none;
            padding: 6px;
            flex: 1;
            min-width: 80px;
        }
        .tag-input:focus {
            outline: none;
        }
        /* Галерея */
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .image-item {
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-remove {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }
        /* Вариации */
        .variations-list {
            margin-top: 16px;
        }
        .variation-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            animation: fadeOut 2s ease;
            z-index: 1000;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body>
<div class="add-product-container">
    <a href="javascript:history.back()" class="back-link">← Назад к списку товаров</a>
    
    <div class="form-card">
        <h1 class="form-title" id="formTitle">➕ Добавить товар</h1>
        
        <form id="productForm">
            <!-- Основная информация -->
            <div class="form-section">
                <h3>📋 Основная информация</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Название *</label>
                        <input type="text" id="productTitle" required placeholder="Хлопковая футболка">
                    </div>
                    <div class="form-group">
                        <label>Артикул</label>
                        <input type="text" id="productArticle" placeholder="TSH-001">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Категория</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="productCategory" style="flex: 1;">
                                <option value="">Без категории</option>
                            </select>
                            <button type="button" class="btn-secondary" id="addCategoryBtn">➕ Новая</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Цвет</label>
                        <input type="text" id="productColor" placeholder="Белый, Черный, Синий...">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="number" id="productPrice" placeholder="1990">
                    </div>
                    <div class="form-group">
                        <label>Цена со скидкой</label>
                        <input type="number" id="productDiscount" placeholder="1490">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Описание (до 2000 символов)</label>
                    <textarea id="productDescription" rows="5" maxlength="2000" placeholder="Подробное описание товара..."></textarea>
                    <div style="font-size: 11px; color: #999; text-align: right;"><span id="charCount">0</span>/2000</div>
                </div>
            </div>
            
            <!-- Характеристики -->
            <div class="form-section">
                <h3>📏 Характеристики</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Воротник</label>
                        <select id="charCollar">
                            <option value="">Не указано</option>
                            <option>Круглый</option><option>V-образный</option><option>Стойка</option>
                            <option>Отложной</option><option>Хомут</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Рукава</label>
                        <select id="CharSleeves">
                            <option value="">Не указано</option>
                            <option>Короткие</option><option>Длинные</option><option>3/4</option>
                            <option>Без рукавов</option><option>Реглан</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Карманы</label>
                        <select id="charPockets">
                            <option value="">Не указано</option>
                            <option>Нет</option><option>Накладные</option><option>Прорезные</option>
                            <option>Внутренние</option><option>С кармашком</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Вид застёжки</label>
                        <select id="charClasp">
                            <option value="">Не указано</option>
                            <option>Молния</option><option>Пуговицы</option><option>Кнопки</option>
                            <option>Крючки</option><option>Без застёжки</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Длина изделия</label>
                        <select id="charLength">
                            <option value="">Не указано</option>
                            <option>Короткое</option><option>Стандартное</option>
                            <option>Удлинённое</option><option>Длинное</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Силуэт</label>
                        <select id="charSilhouette">
                            <option value="">Не указано</option>
                            <option>Прямой</option><option>Приталенный</option>
                            <option>Оверсайз</option><option>Трапеция</option><option>Расширенный</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Размерная таблица -->
            <div class="form-section">
                <h3>📊 Размерная таблица</h3>
                <div class="sizes-table-container">
                    <table class="sizes-table" id="sizesTable">
                        <thead>
                            <tr><th>Размер</th><th>Цена (₽)</th><th>Штрих-код</th><th style="width: 40px;"></th></tr>
                        </thead>
                        <tbody id="sizesTableBody"></tbody>
                    </table>
                </div>
                <button type="button" class="btn-secondary add-row-btn" id="addSizeRowBtn">+ Добавить размер</button>
                <button type="button" class="btn-secondary" id="generateBarcodesBtn" style="margin-left: 8px;">🔢 Сгенерировать штрих-коды для всех</button>
            </div>
            
            <!-- Ярлыки -->
            <div class="form-section">
                <h3>🏷️ Ярлыки</h3>
                <div class="tag-input-container" id="tagsContainer">
                    <input type="text" class="tag-input" id="tagInput" placeholder="Введите ярлык и нажмите Enter (хит, новинка, распродажа...)">
                </div>
            </div>
            
            <!-- Фотографии -->
            <div class="form-section">
                <h3>🖼️ Фотографии</h3>
                <div class="tag-input-container" id="imagesContainer">
                    <input type="text" class="tag-input" id="imageInput" placeholder="Введите URL фото и нажмите Enter">
                </div>
                <div class="image-gallery" id="imageGallery"></div>
            </div>
            
            <!-- Объединение карточек (вариации) -->
            <div class="form-section">
                <h3>🔄 Объединение карточек товаров</h3>
                <div class="form-group">
                    <label>SKU родительской карточки (для объединения вариаций)</label>
                    <input type="text" id="parentSku" placeholder="Введите общий SKU для всех вариаций товара">
                </div>
                <div style="font-size: 12px; color: #999; margin-top: 8px;">
                    💡 Товары с одинаковым SKU будут отображаться как вариации (размеры/цвета) одной карточки
                </div>
                <div id="variationsList" class="variations-list"></div>
            </div>
            
            <button type="submit" class="btn-save" id="saveBtn">💾 Сохранить товар</button>
            <button type="button" class="btn-delete" id="deleteBtn" style="display: none;">🗑️ Удалить товар</button>
        </form>
    </div>
</div>

<script>
    // ===== ПОЛУЧАЕМ ID ТОВАРА ИЗ URL =====
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('id');
    
    let products = [];
    let categories = [];
    let editingId = null;
    
    // Коллекции
    let tags = [];
    let images = [];
    let sizeRows = []; // { size, price, barcode }
    
    // Характеристики
    let characteristics = {
        collar: '', sleeves: '', pockets: '', clasp: '', length: '', silhouette: ''
    };
    
    // ===== ФУНКЦИИ ДЛЯ ТАБЛИЦЫ РАЗМЕРОВ =====
    function renderSizesTable() {
        const tbody = document.getElementById('sizesTableBody');
        tbody.innerHTML = sizeRows.map((row, index) => `
            <tr>
                <td><input type="text" class="size-input" data-index="${index}" value="${escapeHtml(row.size)}" placeholder="S, M, L..."></td>
                <td><input type="number" class="price-input" data-index="${index}" value="${row.price || ''}" placeholder="Цена"></td>
                <td><input type="text" class="barcode-input" data-index="${index}" value="${escapeHtml(row.barcode || '')}" placeholder="Штрих-код"></td>
                <td><button type="button" class="btn-secondary remove-row" data-index="${index}" style="background:#ffebee; color:#f44336;">✖</button></td>
            </tr>
        `).join('');
        
        // Навешиваем события на инпуты
        document.querySelectorAll('.size-input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                sizeRows[idx].size = e.target.value;
            });
        });
        document.querySelectorAll('.price-input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                sizeRows[idx].price = parseInt(e.target.value) || 0;
            });
        });
        document.querySelectorAll('.barcode-input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                sizeRows[idx].barcode = e.target.value;
            });
        });
        document.querySelectorAll('.remove-row').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.index);
                sizeRows.splice(idx, 1);
                renderSizesTable();
            });
        });
    }
    
    function generateBarcodes() {
        sizeRows.forEach(row => {
            if (!row.barcode) {
                row.barcode = '46' + Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
            }
        });
        renderSizesTable();
        showToast('✅ Штрих-коды сгенерированы');
    }
    
    // ===== ФУНКЦИИ ДЛЯ ТЕГОВ =====
    function renderTags() {
        const container = document.getElementById('tagsContainer');
        container.innerHTML = '';
        tags.forEach((tag, index) => {
            const tagEl = document.createElement('span');
            tagEl.className = 'tag';
            tagEl.innerHTML = `${escapeHtml(tag)} <span class="tag-remove" data-index="${index}">×</span>`;
            container.appendChild(tagEl);
        });
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'tag-input';
        input.id = 'tagInput';
        input.placeholder = 'Введите ярлык и нажмите Enter';
        container.appendChild(input);
        
        document.getElementById('tagInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const value = e.target.value.trim();
                if (value && !tags.includes(value)) {
                    tags.push(value);
                    renderTags();
                }
            }
        });
        
        document.querySelectorAll('.tag-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const index = parseInt(btn.dataset.index);
                tags.splice(index, 1);
                renderTags();
            });
        });
    }
    
    // ===== ФУНКЦИИ ДЛЯ ФОТОГРАФИЙ =====
    function renderImages() {
        const gallery = document.getElementById('imageGallery');
        gallery.innerHTML = images.map((url, index) => `
            <div class="image-item">
                <img src="${escapeHtml(url)}" alt="Фото">
                <span class="image-remove" data-index="${index}">×</span>
            </div>
        `).join('');
        
        document.querySelectorAll('.image-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const index = parseInt(btn.dataset.index);
                images.splice(index, 1);
                renderImages();
            });
        });
        
        const input = document.getElementById('imageInput');
        if (input) {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const value = input.value.trim();
                    if (value) {
                        images.push(value);
                        renderImages();
                        input.value = '';
                    }
                }
            });
        }
    }
    
    // ===== ЗАГРУЗКА ДАННЫХ =====
    function loadData() {
        const saved = localStorage.getItem('crm_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                products = data.products || [];
                categories = data.categories || [];
            } catch(e) {}
        }
        
        if (categories.length === 0) {
            categories = [
                { id: 1, title: 'Одежда' },
                { id: 2, title: 'Обувь' },
                { id: 3, title: 'Аксессуары' }
            ];
        }
        
        renderCategories();
        loadVariations();
        
        // Если редактируем
        if (editId) {
            editingId = parseInt(editId);
            const product = products.find(p => p.id === editingId);
            if (product) {
                document.getElementById('formTitle').innerText = '✏️ Редактировать товар';
                document.getElementById('productTitle').value = product.title || '';
                document.getElementById('productArticle').value = product.article || '';
                document.getElementById('productCategory').value = product.category_id || '';
                document.getElementById('productColor').value = product.color || '';
                document.getElementById('productPrice').value = product.price || '';
                document.getElementById('productDiscount').value = product.discount_price || '';
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('charCount').innerText = (product.description || '').length;
                
                // Характеристики
                const chars = product.characteristics || {};
                document.getElementById('charCollar').value = chars.collar || '';
                document.getElementById('CharSleeves').value = chars.sleeves || '';
                document.getElementById('charPockets').value = chars.pockets || '';
                document.getElementById('charClasp').value = chars.clasp || '';
                document.getElementById('charLength').value = chars.length || '';
                document.getElementById('charSilhouette').value = chars.silhouette || '';
                
                tags = product.tags || [];
                images = product.images || [];
                sizeRows = product.sizes_data || [];
                document.getElementById('parentSku').value = product.parent_sku || '';
                
                renderTags();
                renderImages();
                renderSizesTable();
                
                document.getElementById('deleteBtn').style.display = 'block';
            }
        }
        
        // Подсчёт символов в описании
        const descInput = document.getElementById('productDescription');
        descInput.addEventListener('input', () => {
            document.getElementById('charCount').innerText = descInput.value.length;
        });
    }
    
    function renderCategories() {
        const catSelect = document.getElementById('productCategory');
        catSelect.innerHTML = '<option value="">Без категории</option>' + 
            categories.map(c => `<option value="${c.id}">${escapeHtml(c.title)}</option>`).join('');
    }
    
    function loadVariations() {
        const parentSkuInput = document.getElementById('parentSku');
        const variationsDiv = document.getElementById('variationsList');
        
        parentSkuInput.addEventListener('input', () => {
            const sku = parentSkuInput.value.trim();
            if (sku && editingId) {
                const variations = products.filter(p => p.parent_sku === sku && p.id !== editingId);
                if (variations.length > 0) {
                    variationsDiv.innerHTML = `
                        <div style="background: #e8f5e9; padding: 12px; border-radius: 12px;">
                            <strong>🔗 Найдено вариаций с таким же SKU:</strong>
                            ${variations.map(v => `<div>• ${v.title} (${v.sizes?.join(', ') || 'без размеров'})</div>`).join('')}
                            <div style="font-size: 12px; color: #666; margin-top: 8px;">Товары с одинаковым SKU будут объединены в одну карточку как вариации</div>
                        </div>
                    `;
                } else {
                    variationsDiv.innerHTML = '';
                }
            } else {
                variationsDiv.innerHTML = '';
            }
        });
    }
    
    // ===== СОХРАНЕНИЕ =====
    function addCategory() {
        const newCat = prompt('Введите название новой категории:');
        if (newCat && newCat.trim()) {
            const newId = categories.length > 0 ? Math.max(...categories.map(c => c.id)) + 1 : 1;
            categories.push({ id: newId, title: newCat.trim() });
            renderCategories();
            saveToCRM();
            showToast(`✅ Категория "${newCat}" добавлена`);
        }
    }
    
    function saveToCRM() {
        let crmData = localStorage.getItem('crm_data');
        if (crmData) {
            const data = JSON.parse(crmData);
            data.products = products;
            data.categories = categories;
            localStorage.setItem('crm_data', JSON.stringify(data));
        } else {
            localStorage.setItem('crm_data', JSON.stringify({ 
                products, categories, leads: [], messages: {}, settings: {} 
            }));
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function saveProduct(e) {
        e.preventDefault();
        
        const title = document.getElementById('productTitle').value.trim();
        if (!title) {
            alert('Введите название товара');
            return;
        }
        
        const productData = {
            title: title,
            article: document.getElementById('productArticle').value.trim() || null,
            category_id: parseInt(document.getElementById('productCategory').value) || null,
            color: document.getElementById('productColor').value.trim() || null,
            price: parseInt(document.getElementById('productPrice').value) || 0,
            discount_price: parseInt(document.getElementById('productDiscount').value) || null,
            description: document.getElementById('productDescription').value || null,
            characteristics: {
                collar: document.getElementById('charCollar').value || null,
                sleeves: document.getElementById('CharSleeves').value || null,
                pockets: document.getElementById('charPockets').value || null,
                clasp: document.getElementById('charClasp').value || null,
                length: document.getElementById('charLength').value || null,
                silhouette: document.getElementById('charSilhouette').value || null
            },
            tags: tags,
            images: images,
            sizes_data: sizeRows,
            parent_sku: document.getElementById('parentSku').value.trim() || null
        };
        
        if (editingId) {
            const index = products.findIndex(p => p.id === editingId);
            if (index !== -1) {
                products[index] = { ...products[index], ...productData };
                showToast('✏️ Товар обновлён');
            }
        } else {
            const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
            products.push({ id: newId, ...productData, created_at: new Date().toISOString() });
            showToast('✅ Товар добавлен');
        }
        
        saveToCRM();
        
        setTimeout(() => {
            window.location.href = '/murano-apparel/pages/products.html';
        }, 500);
    }
    
    function deleteProduct() {
        if (confirm('Удалить товар? Это действие нельзя отменить.')) {
            products = products.filter(p => p.id !== editingId);
            saveToCRM();
            showToast('🗑️ Товар удалён');
            setTimeout(() => {
                window.location.href = '/murano-apparel/pages/products.html';
            }, 500);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.getElementById('productForm').addEventListener('submit', saveProduct);
    document.getElementById('deleteBtn').addEventListener('click', deleteProduct);
    document.getElementById('addCategoryBtn').addEventListener('click', addCategory);
    document.getElementById('addSizeRowBtn').addEventListener('click', () => {
        sizeRows.push({ size: '', price: 0, barcode: '' });
        renderSizesTable();
    });
    document.getElementById('generateBarcodesBtn').addEventListener('click', generateBarcodes);
    
    // Инициализация тегов и галереи
    renderTags();
    renderImages();
    renderSizesTable();
    loadData();
</script>
</body>
</html>
