<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            padding: 24px;
        }
        
        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        h1 {
            font-size: 24px;
            color: #0f172a;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(99,102,241,0.4);
        }
        
        /* ===== ФИЛЬТРЫ ===== */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            font-size: 14px;
            background: white;
        }
        
        .category-select {
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            background: white;
        }
        
        /* ===== СЕТКА ТОВАРОВ ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        
        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
        }
        
        .product-image {
            height: 180px;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        
        .product-info {
            padding: 16px;
        }
        
        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .product-category {
            font-size: 12px;
            color: #6366f1;
            margin-bottom: 8px;
        }
        
        .product-sizes {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .product-price {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 12px 0;
        }
        
        .product-price.old {
            text-decoration: line-through;
            color: #94a3b8;
            font-size: 14px;
            font-weight: normal;
            background: none;
            -webkit-background-clip: unset;
            color: #94a3b8;
            margin-left: 8px;
        }
        
        .product-actions {
            display: flex;
            gap: 8px;
        }
        
        .product-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 500;
        }
        
        /* ===== БОКОВАЯ ПАНЕЛЬ (КАК КОРЗИНА) ===== */
        .product-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(16px);
            z-index: 1000;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-left: 1px solid rgba(0,0,0,0.1);
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        
        .product-sidebar.open {
            right: 0;
        }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }
        
        .sidebar-header h3 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        .close-sidebar {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        
        .close-sidebar:hover {
            color: #ef4444;
            transform: scale(1.1);
        }
        
        /* ===== ФОРМА ===== */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #0f172a;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(99,102,241,0.4);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 9999px;
            cursor: pointer;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #e2e8f0;
            padding: 8px;
            border-radius: 9999px;
            cursor: pointer;
        }
        
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 999;
        }
        
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
            grid-column: 1/-1;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 Товары</h1>
        <button class="btn-primary" id="addProductBtn">+ Добавить товар</button>
    </div>
    
    <div class="filters">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по названию...">
        <select id="categoryFilter" class="category-select">
            <option value="all">Все категории</option>
        </select>
    </div>
    
    <div id="productsGrid" class="products-grid">
        <div class="empty-state">Загрузка...</div>
    </div>
    
    <!-- Оверлей -->
    <div class="overlay" id="overlay"></div>
    
    <!-- Боковая панель для добавления/редактирования товара -->
    <div class="product-sidebar" id="productSidebar">
        <div class="sidebar-header">
            <h3 id="sidebarTitle">Добавить товар</h3>
            <button class="close-sidebar" id="closeSidebarBtn">&times;</button>
        </div>
        
        <form id="productForm">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="productTitle" required placeholder="Например: Хлопковая футболка">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="productCategory">
                    <option value="">Без категории</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="productPrice" placeholder="1990">
                </div>
                <div class="form-group">
                    <label>Цена со скидкой</label>
                    <input type="number" id="productDiscount" placeholder="1490">
                </div>
            </div>
            <div class="form-group">
                <label>Размеры (через запятую)</label>
                <input type="text" id="productSizes" placeholder="S, M, L, XL">
            </div>
            <button type="submit" class="btn-submit" id="saveProductBtn">💾 Сохранить товар</button>
        </form>
    </div>
    
    <script>
        // ===== ДАННЫЕ =====
        let products = [];
        let categories = [];
        let editingId = null;
        
        // ===== ЭЛЕМЕНТЫ =====
        const sidebar = document.getElementById('productSidebar');
        const overlay = document.getElementById('overlay');
        const sidebarTitle = document.getElementById('sidebarTitle');
        
        // ===== ФУНКЦИИ ПАНЕЛИ =====
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }
        
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            editingId = null;
            document.getElementById('productForm').reset();
            sidebarTitle.innerText = 'Добавить товар';
        }
        
        // ===== ЗАГРУЗКА ДАННЫХ =====
        function loadData() {
            const saved = localStorage.getItem('crm_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    products = data.products || [];
                    categories = data.categories || [];
                } catch(e) {}
            }
            
            if (products.length === 0) {
                products = [
                    { id: 1, title: 'Хлопковая футболка', price: 1990, discount_price: null, sizes: ['S', 'M', 'L'], category_id: null },
                    { id: 2, title: 'Джинсы skinny', price: 3990, discount_price: 2990, sizes: ['30', '32', '34'], category_id: null }
                ];
            }
            
            if (categories.length === 0) {
                categories = [
                    { id: 1, title: 'Одежда' },
                    { id: 2, title: 'Обувь' }
                ];
            }
            
            renderCategories();
            renderProducts();
        }
        
        // ===== СОХРАНЕНИЕ =====
        function saveToCRM() {
            let crmData = localStorage.getItem('crm_data');
            if (crmData) {
                const data = JSON.parse(crmData);
                data.products = products;
                data.categories = categories;
                localStorage.setItem('crm_data', JSON.stringify(data));
            } else {
                localStorage.setItem('crm_data', JSON.stringify({
                    products: products,
                    categories: categories,
                    leads: [],
                    messages: {},
                    settings: {}
                }));
            }
            showToast('✅ Данные сохранены');
        }
        
        // ===== ОТРИСОВКА ТОВАРОВ =====
        function renderProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            let filtered = [...products];
            if (searchTerm) filtered = filtered.filter(p => p.title.toLowerCase().includes(searchTerm));
            if (categoryFilter !== 'all') filtered = filtered.filter(p => p.category_id == categoryFilter);
            
            const container = document.getElementById('productsGrid');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Нет товаров. Добавьте первый!</div>';
                return;
            }
            
            container.innerHTML = filtered.map(p => {
                const category = categories.find(c => c.id == p.category_id);
                const hasDiscount = p.discount_price && p.discount_price < p.price;
                const sizesText = p.sizes ? p.sizes.join(', ') : '—';
                const icon = getIcon(p.id);
                
                return `
                    <div class="product-card">
                        <div class="product-image">${icon}</div>
                        <div class="product-info">
                            <div class="product-title">${escapeHtml(p.title)}</div>
                            <div class="product-category">${category ? escapeHtml(category.title) : 'Без категории'}</div>
                            <div class="product-sizes">📏 Размеры: ${sizesText}</div>
                            <div class="product-price">
                                ${hasDiscount ? 
                                    `<span>${p.discount_price.toLocaleString()} ₽</span>
                                     <span class="old">${p.price.toLocaleString()} ₽</span>` :
                                    `<span>${p.price.toLocaleString()} ₽</span>`
                                }
                            </div>
                            <div class="product-actions">
                                <button class="edit-product" data-id="${p.id}">✏️ Редактировать</button>
                                <button class="delete-product" data-id="${p.id}">🗑️ Удалить</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.edit-product').forEach(btn => {
                btn.addEventListener('click', () => editProduct(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.delete-product').forEach(btn => {
                btn.addEventListener('click', () => deleteProduct(parseInt(btn.dataset.id)));
            });
        }
        
        function getIcon(id) {
            const icons = ['👕', '👖', '👟', '👔', '🧥', '👗', '🧢', '👞'];
            return icons[(id - 1) % icons.length];
        }
        
        // ===== КАТЕГОРИИ =====
        function renderCategories() {
            const filterSelect = document.getElementById('categoryFilter');
            const catSelect = document.getElementById('productCategory');
            
            const options = categories.map(c => `<option value="${c.id}">${escapeHtml(c.title)}</option>`).join('');
            
            if (filterSelect) filterSelect.innerHTML = '<option value="all">Все категории</option>' + options;
            if (catSelect) catSelect.innerHTML = '<option value="">Без категории</option>' + options;
        }
        
        // ===== CRUD =====
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            editingId = id;
            sidebarTitle.innerText = 'Редактировать товар';
            document.getElementById('productTitle').value = product.title || '';
            document.getElementById('productCategory').value = product.category_id || '';
            document.getElementById('productPrice').value = product.price || '';
            document.getElementById('productDiscount').value = product.discount_price || '';
            document.getElementById('productSizes').value = product.sizes ? product.sizes.join(', ') : '';
            openSidebar();
        }
        
        function deleteProduct(id) {
            if (confirm('Удалить товар? Это действие нельзя отменить.')) {
                products = products.filter(p => p.id !== id);
                saveToCRM();
                renderProducts();
                showToast('🗑️ Товар удалён');
            }
        }
        
        function saveProduct(e) {
            e.preventDefault();
            
            const title = document.getElementById('productTitle').value.trim();
            if (!title) {
                showToast('⚠️ Введите название товара');
                return;
            }
            
            const category_id = parseInt(document.getElementById('productCategory').value) || null;
            const price = parseInt(document.getElementById('productPrice').value) || 0;
            const discount_price = parseInt(document.getElementById('productDiscount').value) || null;
            const sizes = document.getElementById('productSizes').value.split(',').map(s => s.trim()).filter(s => s);
            
            if (editingId) {
                const index = products.findIndex(p => p.id === editingId);
                if (index !== -1) {
                    products[index] = { ...products[index], title, category_id, price, discount_price: discount_price && discount_price < price ? discount_price : null, sizes };
                    showToast('✏️ Товар обновлён');
                }
            } else {
                const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
                products.push({ id: newId, title, category_id, price, discount_price: discount_price && discount_price < price ? discount_price : null, sizes, created_at: new Date().toISOString() });
                showToast('✅ Товар добавлен');
            }
            
            saveToCRM();
            closeSidebar();
            renderProducts();
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ =====
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            loadData();
            
            document.getElementById('addProductBtn').addEventListener('click', () => {
                editingId = null;
                document.getElementById('productForm').reset();
                sidebarTitle.innerText = 'Добавить товар';
                openSidebar();
            });
            
            document.getElementById('closeSidebarBtn').addEventListener('click', closeSidebar);
            overlay.addEventListener('click', closeSidebar);
            document.getElementById('productForm').addEventListener('submit', saveProduct);
            document.getElementById('searchInput').addEventListener('input', () => renderProducts());
            document.getElementById('categoryFilter').addEventListener('change', () => renderProducts());
        }
        
        init();
    </script>
</body>
</html>
