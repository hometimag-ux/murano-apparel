<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор виджетов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .editor-container {
            display: flex;
            height: 100%;
            width: 100%;
        }
        
        /* Левая панель виджетов */
        .widgets-panel {
            width: 260px;
            background: #1e1f22;
            color: #e1e3e6;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2b2d31;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #2b2d31;
        }
        
        .panel-header h3 {
            font-size: 14px;
            color: white;
        }
        
        .panel-header p {
            font-size: 11px;
            color: #949ba4;
            margin-top: 4px;
        }
        
        .widgets-list {
            padding: 12px;
        }
        
        .widget-item {
            background: #2b2d31;
            border: 1px solid #3b3f46;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .widget-item:hover {
            background: #3b3f46;
            transform: translateX(4px);
            border-color: #0066cc;
        }
        
        .widget-item:active {
            cursor: grabbing;
        }
        
        .widget-icon {
            font-size: 20px;
        }
        
        .widget-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .widget-desc {
            font-size: 11px;
            color: #949ba4;
            margin-top: 2px;
        }
        
        /* Центральная область — предпросмотр */
        .preview-area {
            flex: 1;
            background: #e8eaed;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .preview-toolbar {
            background: white;
            padding: 8px 16px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .preview-toolbar span {
            font-size: 13px;
            color: #666;
        }
        
        .preview-frame-wrapper {
            flex: 1;
            background: #fff;
            margin: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        /* Правая панель — настройки */
        .settings-panel {
            width: 300px;
            background: white;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .settings-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }
        
        .settings-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .settings-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .setting-field {
            margin-bottom: 20px;
        }
        
        .setting-field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        
        .setting-field input,
        .setting-field select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .save-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 600;
        }
        
        .save-btn:hover {
            background: #0052a3;
        }
        
        .empty-settings {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- Левая панель: виджеты -->
        <div class="widgets-panel">
            <div class="panel-header">
                <h3>📦 Блоки</h3>
                <p>Перетащите виджет на страницу</p>
            </div>
            <div class="widgets-list">
                <div class="widget-item" data-widget-type="promo-slider" draggable="true">
                    <div class="widget-icon">🎠</div>
                    <div>
                        <div class="widget-name">Промо-слайдер</div>
                        <div class="widget-desc">Карусель с изображениями</div>
                    </div>
                </div>
                <div class="widget-item" data-widget-type="product-grid" draggable="true">
                    <div class="widget-icon">📦</div>
                    <div>
                        <div class="widget-name">Сетка товаров</div>
                        <div class="widget-desc">Вывод товаров</div>
                    </div>
                </div>
                <div class="widget-item" data-widget-type="header-banner" draggable="true">
                    <div class="widget-icon">🏷️</div>
                    <div>
                        <div class="widget-name">Баннер в шапке</div>
                        <div class="widget-desc">Информационная строка</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Центральная область: предпросмотр -->
        <div class="preview-area">
            <div class="preview-toolbar">
                <span>🔍 Предпросмотр</span>
                <span style="margin-left: auto; font-size: 12px;">👇 Кликните на блок для настройки</span>
            </div>
            <div class="preview-frame-wrapper">
                <iframe id="preview-frame" class="preview-frame" title="Превью сайта"></iframe>
            </div>
        </div>

        <!-- Правая панель: настройки -->
        <div class="settings-panel">
            <div class="settings-header">
                <h3>⚙️ Настройки виджета</h3>
            </div>
            <div class="settings-content" id="settings-panel">
                <div class="empty-settings">
                    ✨ Выберите виджет на странице,<br>чтобы изменить его параметры
                </div>
            </div>
        </div>
    </div>

    <script src="js/liquid-engine.js"></script>
    <script src="js/widget-editor.js"></script>
</body>
</html>
