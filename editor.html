<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murano Admin — Панель управления</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Оверлей для мобильных -->
        <div class="menu-overlay" id="menuOverlay"></div>
        
        <!-- Боковое меню -->
        <aside class="sidebar-menu" id="sidebarMenu">
            <div class="sidebar-header">
                <h2>Murano Admin</h2>
                <button class="pin-btn" id="pinBtn">📌</button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-category">Управление</div>
                <div class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Главная</span>
                </div>
                <div class="nav-item" data-page="products">
                    <span class="nav-icon">🏷️</span>
                    <span class="nav-text">Товары</span>
                </div>
                <div class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Заказы</span>
                </div>
                
                <div class="nav-category">Настройки</div>
                <div class="nav-item" data-page="delivery">
                    <span class="nav-icon">🚚</span>
                    <span class="nav-text">Доставка</span>
                </div>
                <div class="nav-item" data-page="payment">
                    <span class="nav-icon">💳</span>
                    <span class="nav-text">Оплата</span>
                </div>
                
                <div class="nav-category">Дизайн</div>
                <div class="nav-item" data-page="widget-editor">
                    <span class="nav-icon">🎨</span>
                    <span class="nav-text">Редактор виджетов</span>
                </div>
                
                <div class="nav-category">Система</div>
                <div class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Настройки</span>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div>Версия 1.0.0</div>
                <div>© Murano Apparel</div>
            </div>
        </aside>
        
        <!-- Основной контент -->
        <div class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="page-title" id="pageTitle">Редактор виджетов</div>
                <div class="user-info">
                    <span>Админ</span>
                    <div class="avatar">A</div>
                </div>
            </div>
            
            <div class="content-area" id="contentArea">
                <!-- Сюда будет загружаться контент -->
                <div class="content-card" style="display: flex; align-items: center; justify-content: center; min-height: 400px;">
                    <div style="text-align: center; color: #999;">
                        <div style="font-size: 48px; margin-bottom: 16px;">🚀</div>
                        <div>Загрузка...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
