<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murano Admin — Панель управления</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Боковое меню -->
        <aside class="sidebar-menu" id="sidebarMenu">
            <div class="sidebar-header">
                <div class="logo-area">
                    <h2>Murano Admin</h2>
                </div>
                <button class="collapse-btn" id="collapseBtn" title="Свернуть/развернуть">
                    <span class="collapse-icon">◀</span>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-category">Управление</div>
                <div class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Главная</span>
                </div>
                <div class="nav-item" data-page="products-new">
                    <span class="nav-icon">🏷️</span>
                    <span class="nav-text">Товары</span>
                </div>
                <div class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Заказы</span>
                </div>
                <div class="nav-item" data-page="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">Диалоги</span>
                </div>
                <div class="nav-item" data-page="delivery">
                    <span class="nav-icon">🚚</span>
                    <span class="nav-text">Доставка</span>
                </div>
                <div class="nav-item" data-page="payment">
                    <span class="nav-icon">💳</span>
                    <span class="nav-text">Оплата</span>
                </div>
                <div class="nav-item" data-page="widget-editor">
                    <span class="nav-icon">🎨</span>
                    <span class="nav-text">Редактор сайта</span>
                </div>
                
                <div class="nav-category">Система</div>
                <div class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Настройки</span>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div>Версия 1.0.0</div>
                <div>© Murano Apparel</div>
            </div>
        </aside>

        <!-- Основной контент (без верхней панели) -->
<!-- Основной контент (упрощённая версия для теста) -->
<div class="main-content">
    <div class="content-area" id="contentArea">
        <!-- Сюда будет загружаться контент напрямую -->
    </div>
</div>
        
        
   

    <script src="js/admin.js"></script>
</body>
</html>
